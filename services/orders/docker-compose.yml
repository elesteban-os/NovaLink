version: '3.8'

services:
  postgres_orders:
    image: postgres:15-alpine
    container_name: postgres_orders
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - orders_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novalink_network

  orders_api:
    build: .
    container_name: orders_api
    depends_on:
      postgres_orders:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres_orders
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_ECHO: ${DB_ECHO}
    ports:
      - "8005:8005"
    volumes:
      - .:/app
    networks:
      - novalink_network
    command: uvicorn main:app --host 0.0.0.0 --port 8005 --reload

volumes:
  orders_db_data:

networks:
  novalink_network:
    driver: bridge
