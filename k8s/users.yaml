apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: users-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-db
spec:
  selector:
    matchLabels:
      app: users-db
  template:
    metadata:
      labels:
        app: users-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          value: "users_user" # Ajustado para predeterminado
        - name: POSTGRES_PASSWORD
          value: "users_pass"
        - name: POSTGRES_DB
          value: "users_db"
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: db-data
        persistentVolumeClaim:
          claimName: users-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: users-db
spec:
  selector:
    app: users-db
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-api
spec:
  selector:
    matchLabels:
      app: users-api
  template:
    metadata:
      labels:
        app: users-api
    spec:
      containers:
      - name: api
        image: users-api:latest
        imagePullPolicy: IfNotPresent # Como usarás Docker Desktop, esto toma la imagen construida localmente
        env:
        - name: POSTGRES_USER
          value: "users_user"
        - name: POSTGRES_PASSWORD
          value: "users_pass"
        - name: POSTGRES_DB
          value: "users_db"
        - name: POSTGRES_HOST
          value: "users-db" # Nombre exacto del Service de K8s creado arriba
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: users-api
spec:
  type: LoadBalancer
  selector:
    app: users-api
  ports:
  - port: 8002
    targetPort: 8000