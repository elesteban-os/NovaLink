apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: skills-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skills-db
spec:
  selector:
    matchLabels:
      app: skills-db
  template:
    metadata:
      labels:
        app: skills-db
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_USER
          value: "user"
        - name: POSTGRES_PASSWORD
          value: "password"
        - name: POSTGRES_DB
          value: "mydb"
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: db-data
        persistentVolumeClaim:
          claimName: skills-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: skills-db
spec:
  selector:
    app: skills-db
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skills-api
spec:
  selector:
    matchLabels:
      app: skills-api
  template:
    metadata:
      labels:
        app: skills-api
    spec:
      containers:
      - name: api
        image: skills-api:latest
        imagePullPolicy: IfNotPresent
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
        env:
        - name: POSTGRES_USER
          value: "user"
        - name: POSTGRES_PASSWORD
          value: "password"
        - name: POSTGRES_DB
          value: "mydb"
        - name: DATABASE_URL
          value: "postgresql://user:password@skills-db:5432/mydb"
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: skills-api
spec:
  type: LoadBalancer
  selector:
    app: skills-api
  ports:
  - port: 8001
    targetPort: 8000