apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-frontend
spec:
  selector:
    matchLabels:
      app: admin-frontend
  template:
    metadata:
      labels:
        app: admin-frontend
    spec:
      containers:
      - name: frontend
        image: admin-frontend-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: admin-frontend-service
spec:
  type: LoadBalancer # Docker Desktop mapea esto automáticamente a tu localhost
  selector:
    app: admin-frontend
  ports:
  - port: 8080 # Entrarás al navegador por http://localhost:8080
    targetPort: 80