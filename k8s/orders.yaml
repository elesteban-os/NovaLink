apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: orders-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-orders
spec:
  selector:
    matchLabels:
      app: postgres-orders
  template:
    metadata:
      labels:
        app: postgres-orders
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          value: "orders_user"
        - name: POSTGRES_PASSWORD
          value: "orders_password"
        - name: POSTGRES_DB
          value: "orders_db"
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: db-data
        persistentVolumeClaim:
          claimName: orders-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-orders
spec:
  selector:
    app: postgres-orders
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
spec:
  selector:
    matchLabels:
      app: orders-api
  template:
    metadata:
      labels:
        app: orders-api
    spec:
      containers:
      - name: api
        image: orders-api:latest
        imagePullPolicy: IfNotPresent
        command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8005"]
        env:
        - name: DB_USER
          value: "orders_user"
        - name: DB_PASSWORD
          value: "orders_password"
        - name: DB_HOST
          value: "postgres-orders"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "orders_db"
        - name: DB_ECHO
          value: "false"
        ports:
        - containerPort: 8005
---
apiVersion: v1
kind: Service
metadata:
  name: orders-api
spec:
  type: LoadBalancer
  selector:
    app: orders-api
  ports:
  - port: 8005
    targetPort: 8005